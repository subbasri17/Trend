apiVersion: apps/v1
kind: Deployment
metadata:
  name: trend-tasks-app
  labels:
    app: trend-tasks-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: trend-tasks-app
  template:
    metadata:
      labels:
        app: trend-tasks-app
    spec:
      containers:
        - name: webserver
          image: aarushisuba/webserver:22
          ports:
            - containerPort: 80
